services:
  scraper:
    build: .
    volumes:
      - ./.output:/app/.output
    environment:
      - SCRAPER_PAGES=1
      - SCRAPER_MAX_MODELS=8

  compare:
    build: .
    volumes:
      - ./.output:/app/.output
    command: node dist/compare.js
    environment:
      - SCRAPE_FILE=samsung-phones-page-1.json
